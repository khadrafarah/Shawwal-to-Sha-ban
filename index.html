<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quran Reading Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@400;500&family=Spectral:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1408;
    --parchment: #f5efe0;
    --gold: #b8963e;
    --gold-light: #d4ae5e;
    --gold-pale: #f0e4c0;
    --teal: #2a5c5c;
    --teal-light: #3d7a7a;
    --teal-pale: #e8f2f2;
    --done-bg: #e8f5e9;
    --done-text: #2e7d32;
    --border: #d4c49a;
    --muted: #7a6a48;
    --shadow: rgba(26, 20, 8, 0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--parchment);
    color: var(--ink);
    font-family: 'Spectral', Georgia, serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(184,150,62,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(42,92,92,0.06) 0%, transparent 60%);
  }

  /* HEADER */
  header {
    text-align: center;
    padding: 2.5rem 1.5rem 1.5rem;
    border-bottom: 1px solid var(--border);
    position: relative;
    background: linear-gradient(180deg, rgba(184,150,62,0.06) 0%, transparent 100%);
  }

  .bismillah {
    font-family: 'Amiri', serif;
    font-size: 1.8rem;
    color: var(--gold);
    letter-spacing: 0.02em;
    margin-bottom: 0.75rem;
    display: block;
  }

  header h1 {
    font-family: 'Spectral', serif;
    font-weight: 300;
    font-size: 1.5rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 0.25rem;
  }

  header p.subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* NAV */
  .nav-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.85rem 1.25rem;
    background: var(--teal);
    position: sticky;
    top: 0;
    z-index: 100;
    gap: 0.5rem;
  }

  .nav-btn {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    padding: 0.35rem 0.65rem;
    border-radius: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.22); }
  .nav-btn.active {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--ink);
    font-weight: 500;
  }

  .today-btn {
    background: var(--gold);
    border: none;
    color: var(--ink);
    padding: 0.4rem 0.85rem;
    border-radius: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    font-weight: 500;
    transition: background 0.2s;
  }
  .today-btn:hover { background: var(--gold-light); }

  .week-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: rgba(255,255,255,0.7);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-align: center;
    flex: 1;
  }

  /* PROGRESS BAR */
  .progress-wrap {
    padding: 0.8rem 1.25rem;
    background: rgba(42,92,92,0.04);
    border-bottom: 1px solid var(--border);
  }

  .progress-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.4rem;
  }

  .progress-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .progress-count {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    color: var(--teal);
    font-weight: 500;
  }

  .progress-track {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--teal), var(--gold));
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* WEEK VIEW */
  .week-container {
    padding: 1rem 1rem 5rem;
    max-width: 480px;
    margin: 0 auto;
  }

  .week-header {
    text-align: center;
    margin-bottom: 1.25rem;
    padding: 0.75rem 0;
  }

  .week-title {
    font-family: 'Spectral', serif;
    font-weight: 600;
    font-size: 1.1rem;
    color: var(--teal);
    margin-bottom: 0.2rem;
  }

  .quarter-badge {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
    border: 1px solid var(--gold-pale);
    background: rgba(184,150,62,0.07);
    padding: 0.2rem 0.5rem;
    border-radius: 20px;
  }

  /* DAY CARD */
  .day-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 0.85rem;
    overflow: hidden;
    box-shadow: 0 1px 4px var(--shadow);
    transition: box-shadow 0.2s;
  }
  .day-card:hover { box-shadow: 0 3px 10px var(--shadow); }
  .day-card.is-today { border-color: var(--teal); border-width: 2px; }
  .day-card.all-done {
    background: linear-gradient(135deg, #f8fff8 0%, #fff 100%);
    border-color: #a5d6a7;
  }

  .day-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 0.75rem 1rem 0.6rem;
    border-bottom: 1px solid rgba(212,196,154,0.4);
    gap: 0.75rem;
  }

  .day-meta {
    flex: 1;
    min-width: 0;
  }

  .day-name-row {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    margin-bottom: 0.2rem;
  }

  .today-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--teal);
    flex-shrink: 0;
  }

  .day-name {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .day-card.is-today .day-name { color: var(--teal); }

  .lesson-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--gold);
    letter-spacing: 0.06em;
  }

  .reading-portion {
    font-family: 'Spectral', serif;
    font-style: italic;
    font-size: 0.9rem;
    color: var(--ink);
    line-height: 1.3;
  }

  .done-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--done-text);
    background: var(--done-bg);
    border: 1px solid #a5d6a7;
    padding: 0.2rem 0.45rem;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* TASKS */
  .tasks {
    padding: 0.5rem 0.75rem 0.65rem;
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }

  .task-row {
    display: flex;
    align-items: center;
    gap: 0.65rem;
    padding: 0.45rem 0.5rem;
    border-radius: 5px;
    cursor: pointer;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .task-row:hover { background: rgba(42,92,92,0.05); }
  .task-row:active { background: rgba(42,92,92,0.1); }

  .task-check {
    width: 18px;
    height: 18px;
    border: 2px solid var(--border);
    border-radius: 4px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    background: #fff;
  }

  .task-row.checked .task-check {
    background: var(--teal);
    border-color: var(--teal);
  }

  .check-icon {
    display: none;
    width: 10px;
    height: 10px;
  }
  .task-row.checked .check-icon { display: block; }

  .task-icon {
    font-size: 0.85rem;
    flex-shrink: 0;
    width: 18px;
    text-align: center;
  }

  .task-label {
    font-family: 'Spectral', serif;
    font-size: 0.82rem;
    color: var(--ink);
    flex: 1;
    transition: color 0.2s;
  }
  .task-row.checked .task-label {
    color: var(--muted);
    text-decoration: line-through;
    text-decoration-color: var(--border);
  }

  /* MINI TASK DOTS */
  .task-dots {
    display: flex;
    gap: 3px;
    flex-shrink: 0;
  }
  .task-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.2s;
  }
  .task-dot.filled { background: var(--teal); }

  /* FLOATING TODAY */
  .float-today {
    position: fixed;
    bottom: 1.25rem;
    right: 1.25rem;
    background: var(--teal);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 0.6rem 1.1rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(42,92,92,0.35);
    transition: all 0.2s;
    display: none;
  }
  .float-today:hover {
    background: var(--teal-light);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(42,92,92,0.4);
  }
  .float-today.visible { display: block; }

  /* EID BREAK */
  .eid-break {
    background: linear-gradient(135deg, rgba(184,150,62,0.1), rgba(42,92,92,0.08));
    border: 1px dashed var(--gold);
    border-radius: 8px;
    padding: 1.1rem;
    text-align: center;
    margin-bottom: 0.85rem;
  }
  .eid-break h3 {
    font-family: 'Amiri', serif;
    font-size: 1.1rem;
    color: var(--gold);
    margin-bottom: 0.2rem;
  }
  .eid-break p {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* SCROLLED INDICATOR */
  .scroll-top {
    position: fixed;
    bottom: 1.25rem;
    left: 1.25rem;
    background: rgba(26,20,8,0.7);
    color: #fff;
    border: none;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    font-size: 0.9rem;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
    transition: opacity 0.2s;
  }
  .scroll-top.visible { display: flex; }

  @media (max-width: 360px) {
    .reading-portion { font-size: 0.82rem; }
    .task-label { font-size: 0.78rem; }
  }
</style>
</head>

const TASKS = [
  { key:'mushaf', icon:'📖', label:'Recite from Mushaf' },
  { key:'translation', icon:'🌐', label:'Read Translation' },
  { key:'tafsir', icon:'✍️', label:'Read Tafsir' },
];

const STORAGE_KEY = 'quran_schedule_v1';

// ─── STATE ────────────────────────────────────────────────────────────────────
let state = {}; // { 'lesson_1_mushaf': true, ... }
let currentWeekIndex = 0;

function loadState() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) state = JSON.parse(s);
  } catch(e) { state = {}; }
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function toggleTask(lessonNum, taskKey) {
  const k = `lesson_${lessonNum}_${taskKey}`;
  state[k] = !state[k];
  saveState();
  renderWeek();
  updateProgress();
}

function isChecked(lessonNum, taskKey) {
  return !!state[`lesson_${lessonNum}_${taskKey}`];
}

// ─── DATE UTILS ───────────────────────────────────────────────────────────────
function todayStr() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

function findTodayWeekIndex() {
  const today = todayStr();
  for (let wi = 0; wi < WEEKS.length; wi++) {
    const w = WEEKS[wi];
    if (w.eid) continue;
    const [s, e] = w.lessons;
    const days = SCHEDULE.filter(l => l.lesson >= s && l.lesson <= e);
    if (days.some(l => l.date === today)) return wi;
  }
  // If before schedule, show week 1; if after, show last
  if (today < SCHEDULE[0].date) return 0;
  return WEEKS.length - 1;
}

function formatDate(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const date = new Date(y, m-1, d);
  return date.toLocaleDateString('en-US', { month:'short', day:'numeric' });
}

// ─── PROGRESS ─────────────────────────────────────────────────────────────────
function updateProgress() {
  const total = SCHEDULE.length * 3;
  let done = 0;
  SCHEDULE.forEach(l => {
    TASKS.forEach(t => { if (isChecked(l.lesson, t.key)) done++; });
  });
  document.getElementById('progressCount').textContent = `${done} / ${total} tasks`;
  document.getElementById('progressFill').style.width = `${(done/total)*100}%`;
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function ordinal(n) {
  if (n===1) return 'One'; if (n===2) return 'Two'; if (n===3) return 'Three';
  if (n===4) return 'Four'; if (n===5) return 'Five'; if (n===6) return 'Six';
  if (n===7) return 'Seven'; if (n===8) return 'Eight'; if (n===9) return 'Nine';
  if (n===10) return 'Ten';
  const s = ['th','st','nd','rd'], v=n%100;
  return n + (s[(v-20)%10]||s[v]||s[0]);
}

function renderWeek() {
  const week = WEEKS[currentWeekIndex];
  const today = todayStr();
  const container = document.getElementById('weekContainer');

  // nav label
  document.getElementById('weekLabel').textContent = `Week ${ordinal(week.num)}`;

  // update nav buttons
  document.getElementById('prevBtn').disabled = currentWeekIndex === 0;
  document.getElementById('nextBtn').disabled = currentWeekIndex === WEEKS.length - 1;

  let html = `
    <div class="week-header">
      <div class="week-title">Week ${ordinal(week.num)}</div>
      <span class="quarter-badge">${week.q}</span>
    </div>
  `;

  if (week.eid) {
    html += `
      <div class="eid-break">
        <h3>عيد مبارك</h3>
        <p>'Eid Break — May 24–30</p>
      </div>
    `;
  } else {
    const [s, e] = week.lessons;
    const days = SCHEDULE.filter(l => l.lesson >= s && l.lesson <= e);

    days.forEach(lesson => {
      const isToday = lesson.date === today;
      const allDone = TASKS.every(t => isChecked(lesson.lesson, t.key));
      const doneCount = TASKS.filter(t => isChecked(lesson.lesson, t.key)).length;

      html += `<div class="day-card${isToday ? ' is-today' : ''}${allDone ? ' all-done' : ''}" id="card_${lesson.lesson}">
        <div class="day-header">
          <div class="day-meta">
            <div class="day-name-row">
              ${isToday ? '<div class="today-dot"></div>' : ''}
              <span class="day-name">${lesson.day}, ${formatDate(lesson.date)}</span>
            </div>
            <div class="lesson-num">Lesson ${lesson.lesson}</div>
            <div class="reading-portion">${lesson.portion}</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:0.35rem;">
            ${allDone ? '<span class="done-badge">✓ Done</span>' : ''}
            <div class="task-dots">
              ${TASKS.map(t => `<div class="task-dot${isChecked(lesson.lesson, t.key) ? ' filled' : ''}"></div>`).join('')}
            </div>
          </div>
        </div>
        <div class="tasks">
          ${TASKS.map(t => `
            <div class="task-row${isChecked(lesson.lesson, t.key) ? ' checked' : ''}"
                 onclick="toggleTask(${lesson.lesson}, '${t.key}')">
              <div class="task-check">
                <svg class="check-icon" viewBox="0 0 10 10" fill="none">
                  <path d="M1.5 5L4 7.5L8.5 2.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
              <span class="task-icon">${t.icon}</span>
              <span class="task-label">${t.label}</span>
            </div>
          `).join('')}
        </div>
      </div>`;
    });
  }

  container.innerHTML = html;

  // Scroll to today card if on current week
  if (week.lessons) {
    const [s, e] = week.lessons;
    const todayLesson = SCHEDULE.find(l => l.date === today && l.lesson >= s && l.lesson <= e);
    if (todayLesson) {
      requestAnimationFrame(() => {
        const card = document.getElementById(`card_${todayLesson.lesson}`);
        if (card) card.scrollIntoView({ behavior:'smooth', block:'center' });
      });
    }
  }
}

function changeWeek(dir) {
  const newIdx = currentWeekIndex + dir;
  if (newIdx < 0 || newIdx >= WEEKS.length) return;
  currentWeekIndex = newIdx;
  window.scrollTo({ top: 0, behavior: 'smooth' });
  renderWeek();
}

function goToToday() {
  const todayWeekIdx = findTodayWeekIndex();
  if (currentWeekIndex !== todayWeekIdx) {
    currentWeekIndex = todayWeekIdx;
    renderWeek();
  }
  const today = todayStr();
  const lesson = SCHEDULE.find(l => l.date === today);
  if (lesson) {
    setTimeout(() => {
      const card = document.getElementById(`card_${lesson.lesson}`);
      if (card) card.scrollIntoView({ behavior:'smooth', block:'center' });
    }, 100);
  }
}

// Float today button visibility
function checkFloatBtn() {
  const today = todayStr();
  const todayLesson = SCHEDULE.find(l => l.date === today);
  if (!todayLesson) return;
  const card = document.getElementById(`card_${todayLesson.lesson}`);
  const btn = document.getElementById('floatToday');
  const scrollTop = document.getElementById('scrollTop');
  if (!card) {
    btn.classList.add('visible');
  } else {
    const rect = card.getBoundingClientRect();
    btn.classList.toggle('visible', rect.top > window.innerHeight || rect.bottom < 0);
  }
  scrollTop.classList.toggle('visible', window.scrollY > 300);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadState();
currentWeekIndex = findTodayWeekIndex();
renderWeek();
updateProgress();

window.addEventListener('scroll', checkFloatBtn, { passive: true });
checkFloatBtn();
</script>
